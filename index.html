<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system}
body{background:#f7f7f7;padding:12px;max-width:800px;margin:0 auto;}

.top-card{background:#fff;padding:16px;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 6px #eee;}
.sum-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.sum-text{font-size:18px;color:#444;}
.sum-price{font-size:32px;color:#f04142;font-weight:bold;}
.sum-count{font-size:16px;color:#2266bb;font-weight:bold;}

.search-box{margin-bottom:15px;}
#searchInput{
    width:100%;padding:13px 15px;border:1px solid #ddd;border-radius:10px;
    font-size:16px;outline:none;
}

.goods-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;margin-bottom:20px;
}
.item-btn{
    padding:12px 6px;border:0;border-radius:8px;background:#3690ff;color:#fff;font-size:13px;
}
.item-btn:active{background:#2373d8}

.list-title{
    font-size:17px;margin:8px 0 8px;font-weight:bold;
    display:flex;justify-content:space-between;align-items:center;
}
.printBtn{
    padding:6px 14px;background:#22bb55;color:#fff;border:none;border-radius:6px;font-size:14px;
}

.selected-box{
    background:#fff;padding:12px;border-radius:10px;margin-bottom:15px;
    max-height:320px;overflow-y:auto;
}
.selected-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 0;border-bottom:1px solid #eee;font-size:14px;
}
.oper-box{display:flex;gap:6px;}
.subBtn{
    background:#ff5555;color:#fff;border:none;padding:3px 8px;border-radius:5px;font-size:12px;
}
.delAllBtn{
    background:#999;color:#fff;border:none;padding:3px 8px;border-radius:5px;font-size:12px;
}

.reset{
    width:100%;margin-top:8px;padding:14px;background:#f55;font-size:17px;color:#fff;border:0;border-radius:10px;
}

/* 关键修改：不再display:none，改用定位移出可视区域，pdf可以正常抓取 */
.pdf-wrap{position:absolute;left:-9999px;top:0;width:160mm;background:#fff;padding:10px;}
.pdf-date{font-size:15px;color:#333;margin-bottom:10px;}
.pdf-total{font-size:18px;font-weight:bold;text-align:right;margin-top:15px;}
.pdf-item{padding:6px 0;border-bottom:1px solid #999;font-size:14px;}
</style>
</head>

var wrapDom = document.getElementById('goodsWrap');
var totalDom = document.getElementById('totalShow');
var countShow = document.getElementById('countShow');
var searchDom = document.getElementById('searchInput');
var selectDom = document.getElementById('selectedList');
var pdfBox = document.getElementById('pdfBox');
var pdfDate = document.getElementById('pdfDate');
var pdfList = document.getElementById('pdfList');
var pdfTotal = document.getElementById('pdfTotal');

var selectedArr = [];
if(localStorage.getItem("billData")){
    selectedArr = JSON.parse(localStorage.getItem("billData"));
}
var totalMoney = 0;
var totalCount = 0;

function calcTotal(){
    totalMoney = 0;
    totalCount = 0;
    for(var i=0;i<selectedArr.length;i++){
        totalMoney += selectedArr[i].price * selectedArr[i].count;
        totalCount += selectedArr[i].count;
    }
}

function saveStorage(){
    localStorage.setItem("billData",JSON.stringify(selectedArr));
}

function addSelect(goods){
    var exist = null;
    for(var i=0;i<selectedArr.length;i++){
        if(selectedArr[i].no === goods.no){
            exist = selectedArr[i];
            break;
        }
    }
    if(exist){
        exist.count = exist.count + 1;
    }else{
        selectedArr.push({no:goods.no,name:goods.name,price:goods.price,count:1});
    }
    saveStorage();
    calcTotal();
    refreshSelectList();
}

function subOne(idx){
    var item = selectedArr[idx];
    item.count = item.count - 1;
    if(item.count <= 0){
        selectedArr.splice(idx,1);
    }
    saveStorage();
    calcTotal();
    refreshSelectList();
}

function delAllRow(idx){
    selectedArr.splice(idx,1);
    saveStorage();
    calcTotal();
    refreshSelectList();
}

function refreshSelectList(){
    selectDom.innerHTML = "";
    for(var i=0;i<selectedArr.length;i++){
        var item = selectedArr[i];
        var xj = (item.price*item.count).toFixed(2);
        var div = document.createElement('div');
        div.className="selected-item";
        div.innerHTML = '<span>'+item.no+' '+item.name+' '+item.price+'元 ×'+item.count+' = '+xj+'元</span><div class="oper-box"><button class="subBtn" onclick="subOne('+i+')">-1</button><button class="delAllBtn" onclick="delAllRow('+i+')">整删</button></div>';
        selectDom.appendChild(div);
    }
    totalDom.innerText = "¥"+totalMoney.toFixed(2);
    countShow.innerText = "总件数："+totalCount+"件";
}

//导出PDF 增加延时+完善配置，解决微信空白
function savePdf(){
    if(selectedArr.length===0){
        alert("暂无选购商品，无法导出PDF");
        return;
    }
    var d = new Date();
    var m = d.getMonth()+1;
    var day = d.getDate();
    var h = d.getHours();
    var min = d.getMinutes();
    var dateStr = d.getFullYear()+"-"+(m<10?"0"+m:m)+"-"+(day<10?"0"+day:day)+" "+(h<10?"0"+h:h)+":"+(min<10?"0"+min:min);
    pdfDate.innerText = "制单日期："+dateStr;
    pdfList.innerHTML = "";
    for(var i=0;i<selectedArr.length;i++){
        var it = selectedArr[i];
        var sub = (it.price*it.count).toFixed(2);
        var pdiv = document.createElement("div");
        pdiv.className = "pdf-item";
        pdiv.innerText = it.no+" "+it.name+" 单价"+it.price+" ×"+it.count+" = "+sub+"元";
        pdfList.appendChild(pdiv);
    }
    pdfTotal.innerText = "单据汇总：共"+totalCount+"件，合计总金额 ¥"+totalMoney.toFixed(2);

    //关键优化参数
    var opt = {
        margin:8,
        filename:'开单小票_'+d.getFullYear()+''+(m<10?"0"+m:m)+''+(day<10?"0"+day:day)+'.pdf',
        image:{type:'jpeg',quality:0.98},
        html2canvas:{
            scale:1.5,
            useCORS:true,
            allowTaint:true,
            backgroundColor:"#ffffff"
        },
        jsPDF:{unit:'mm',format:'a5',orientation:'portrait'}
    };
    //延时等待DOM渲染完毕再生成PDF，修复微信异步空白
    setTimeout(function(){
        html2pdf().set(opt).from(pdfBox).save();
    },300);
}

function render(list){
    wrapDom.innerHTML="";
    for(var i=0;i<list.length;i++){
        var item = list[i];
        var btn = document.createElement("button");
        btn.className="item-btn";
        btn.innerText = item.no+" "+item.name+" ¥"+item.price;
        btn.onclick = function(obj){return function(){addSelect(obj);}}(item);
        wrapDom.appendChild(btn);
    }
}

function filterGoods(){
    var key = searchDom.value.trim().toLowerCase();
    var arr = [];
    for(var i=0;i<goodsList.length;i++){
        var g = goodsList[i];
        if(g.no.indexOf(key)>-1 || g.name.toLowerCase().indexOf(key)>-1){
            arr.push(g);
        }
    }
    render(arr);
}

function resetAll(){
    selectedArr=[];
    saveStorage();
    calcTotal();
    refreshSelectList();
}

calcTotal();
render(goodsList);
refreshSelectList();
